<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Test API — llm.chiasegpu.vn</title>
<style>
  body { font-family: sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
  h2 { color: #7c6aff; }
  label { font-size: 13px; color: #aaa; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 10px; margin-bottom: 16px; background: #222; border: 1px solid #444; border-radius: 8px; color: #eee; box-sizing: border-box; font-size: 14px; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  button { padding: 10px 20px; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn1 { background: #7c6aff; }
  .btn2 { background: #ff6a9a; }
  .btn3 { background: #20a070; }
  .result-box { padding: 16px; background: #1c1c2e; border-radius: 8px; white-space: pre-wrap; font-size: 13px; min-height: 60px; line-height: 1.7; margin-bottom: 14px; border-left: 3px solid #333; }
  .ok { color: #4ade80; font-weight: bold; }
  .err { color: #f87171; font-weight: bold; }
  .info { color: #ffd96a; }
  .tag { font-size: 11px; font-weight: bold; letter-spacing: 1px; color: #aaa; margin-bottom: 6px; }
</style>
</head>
<body>

<h2>🔌 Test API llm.chiasegpu.vn</h2>

<label>API Key</label>
<input id="apiKey" type="password" placeholder="sk-...">

<div class="btn-row">
  <button class="btn1" onclick="testChatCompletions()" id="btn1">① Test /chat/completions</button>
  <button class="btn2" onclick="testMessages()" id="btn2">② Test /messages</button>
  <button class="btn3" onclick="testModels()" id="btn3">③ GET /models</button>
</div>

<div class="tag">KẾT QUẢ — /v1/chat/completions (format OpenAI)</div>
<div class="result-box" id="r1">Chưa test...</div>

<div class="tag">KẾT QUẢ — /v1/messages (format Anthropic)</div>
<div class="result-box" id="r2">Chưa test...</div>

<div class="tag">KẾT QUẢ — /v1/models</div>
<div class="result-box" id="r3">Chưa test...</div>

<script>
function getKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) { alert('Nhập API Key trước!'); return null; }
  return k;
}

async function testChatCompletions() {
  const key = getKey(); if (!key) return;
  const btn = document.getElementById('btn1');
  const box = document.getElementById('r1');
  btn.disabled = true; box.innerHTML = '⏳ Đang gọi /v1/chat/completions...';
  try {
    const resp = await fetch('https://llm.chiasegpu.vn/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'claude-sonnet-4.6',
        max_tokens: 100,
        messages: [{ role: 'user', content: 'Chào! Trả lời ngắn thôi nhé.' }]
      })
    });
    const data = await resp.json();
    if (!resp.ok) {
      box.innerHTML = `<span class="err">✗ HTTP ${resp.status}</span>\n${JSON.stringify(data, null, 2)}`;
    } else {
      const content = data.choices?.[0]?.message?.content;
      box.innerHTML = `<span class="ok">✓ THÀNH CÔNG!</span>\n\nPhản hồi: ${content}`;
    }
  } catch(e) {
    box.innerHTML = `<span class="err">✗ ${e.message}</span>\n\n${e.message.includes('fetch') ? '⚠ CORS bị chặn — cần chạy trên server (không phải file://)' : ''}`;
  }
  btn.disabled = false;
}

async function testMessages() {
  const key = getKey(); if (!key) return;
  const btn = document.getElementById('btn2');
  const box = document.getElementById('r2');
  btn.disabled = true; box.innerHTML = '⏳ Đang gọi /v1/messages...';
  try {
    const resp = await fetch('https://llm.chiasegpu.vn/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4.6',
        max_tokens: 100,
        messages: [{ role: 'user', content: 'Chào! Trả lời ngắn thôi nhé.' }]
      })
    });
    const data = await resp.json();
    if (!resp.ok) {
      box.innerHTML = `<span class="err">✗ HTTP ${resp.status}</span>\n${JSON.stringify(data, null, 2)}`;
    } else {
      const content = data.content?.[0]?.text;
      box.innerHTML = `<span class="ok">✓ THÀNH CÔNG!</span>\n\nPhản hồi: ${content}`;
    }
  } catch(e) {
    box.innerHTML = `<span class="err">✗ ${e.message}</span>\n\n${e.message.includes('fetch') ? '⚠ CORS bị chặn — cần chạy trên server (không phải file://)' : ''}`;
  }
  btn.disabled = false;
}

async function testModels() {
  const key = getKey(); if (!key) return;
  const btn = document.getElementById('btn3');
  const box = document.getElementById('r3');
  btn.disabled = true; box.innerHTML = '⏳ Đang gọi /v1/models...';
  try {
    const resp = await fetch('https://llm.chiasegpu.vn/v1/models', {
      headers: { 'Authorization': `Bearer ${key}` }
    });
    const data = await resp.json();
    if (!resp.ok) {
      box.innerHTML = `<span class="err">✗ HTTP ${resp.status}</span>\n${JSON.stringify(data, null, 2)}`;
    } else {
      box.innerHTML = `<span class="ok">✓ THÀNH CÔNG!</span>\n\n${JSON.stringify(data, null, 2)}`;
    }
  } catch(e) {
    box.innerHTML = `<span class="err">✗ ${e.message}</span>\n\n${e.message.includes('fetch') ? '⚠ CORS bị chặn — cần chạy trên server (không phải file://)' : ''}`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
