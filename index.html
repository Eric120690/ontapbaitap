<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Test API — llm.chiasegpu.vn</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #111; color: #eee; }
  label { font-size: 13px; color: #aaa; }
  input, textarea { width: 100%; padding: 10px; margin: 6px 0 16px; background: #222; border: 1px solid #444; border-radius: 8px; color: #eee; box-sizing: border-box; font-size: 14px; }
  button { padding: 10px 28px; background: #7c6aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result { margin-top: 20px; padding: 16px; background: #1c1c2e; border-radius: 8px; white-space: pre-wrap; font-size: 14px; min-height: 60px; line-height: 1.6; }
  .ok { color: #4ade80; font-weight: bold; }
  .err { color: #f87171; font-weight: bold; }
</style>
</head>
<body>

<h2>🔌 Test API <span style="color:#7c6aff">llm.chiasegpu.vn</span></h2>

<label>API Key</label>
<input id="apiKey" type="password" placeholder="sk-...">

<label>Tin nhắn test</label>
<input id="message" type="text" value="Hello! Trả lời bằng tiếng Việt nhé.">

<button onclick="testAPI()" id="btn">▶ Gửi test</button>

<div id="result" style="color:#666">Kết quả sẽ hiển thị ở đây...</div>

<script>
async function testAPI() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const message = document.getElementById('message').value.trim();
  const result = document.getElementById('result');
  const btn = document.getElementById('btn');

  if (!apiKey) { result.innerHTML = '<span class="err">⚠ Vui lòng nhập API Key!</span>'; return; }
  if (!message) { result.innerHTML = '<span class="err">⚠ Vui lòng nhập tin nhắn!</span>'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ Đang gửi...';
  result.innerHTML = 'Đang kết nối đến <b>llm.chiasegpu.vn</b>...';

  try {
    const resp = await fetch('https://llm.chiasegpu.vn/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4.6',
        max_tokens: 500,
        messages: [{ role: 'user', content: message }]
      })
    });

    const data = await resp.json();

    if (!resp.ok) {
      result.innerHTML = `<span class="err">✗ Lỗi ${resp.status}</span>\n\n${JSON.stringify(data, null, 2)}`;
    } else {
      const content = data.choices?.[0]?.message?.content || JSON.stringify(data, null, 2);
      result.innerHTML = `<span class="ok">✓ API hoạt động!</span>\n\n${content}`;
    }
  } catch (err) {
    result.innerHTML = `<span class="err">✗ ${err.message}</span>\n\n` +
      (err.message.includes('fetch') ? '⚠ Bị chặn CORS khi mở file:// — hãy upload lên GitHub Pages để test.' : '');
  }

  btn.disabled = false;
  btn.textContent = '▶ Gửi test';
}
</script>
</body>
</html>
